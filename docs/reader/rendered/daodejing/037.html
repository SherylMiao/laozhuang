<h2>第三十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>常<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>而<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>不為。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="侯王">侯王</span>若能守之，<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>將自化。</p>
<p><a id="pn-3" class="pn">[3]</a> 化而欲作，吾將鎮之以<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>名之<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>名之<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>，夫亦將<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>欲。</p>
<p><a id="pn-5" class="pn">[5]</a> 不欲以靜，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>將自定。</p>
