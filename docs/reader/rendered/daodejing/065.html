<h2>第六十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> 古之<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>為<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者，非以明民，將以愚之。</p>
<p><a id="pn-2" class="pn">[2]</a> 民之難治，以其<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>多。</p>
<p><a id="pn-3" class="pn">[3]</a> 故以<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>治國，國之賊；不以<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>治國，國之福。</p>
<p><a id="pn-4" class="pn">[4]</a> 知此兩者亦𥡴式。</p>
<p><a id="pn-5" class="pn">[5]</a> 常知𥡴式，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄德">玄德</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="玄德">玄德</span>深矣，遠矣，與物反矣，然後乃至<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>順。</p>
</article>
