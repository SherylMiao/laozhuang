<h2>第三十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="上德">上德</span>不<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>，是以<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>；<span class="entity entity-concept" data-entity-type="concept" data-canonical="下德">下德</span>不失<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>，是以<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="上德">上德</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>而<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以為；<span class="entity entity-concept" data-entity-type="concept" data-canonical="下德">下德</span>為之而<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>以為。</p>
<p><a id="pn-3" class="pn">[3]</a> 上<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>為之而<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以為；上<span class="entity entity-concept" data-entity-type="concept" data-canonical="義">義</span>為之而<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>以為。</p>
<p><a id="pn-4" class="pn">[4]</a> 上<span class="entity entity-concept" data-entity-type="concept" data-canonical="禮">禮</span>為之而莫之應，則攘臂而扔之。</p>
<p><a id="pn-5" class="pn">[5]</a> 故失<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>而後<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>，失<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>而後<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>，失<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>而後<span class="entity entity-concept" data-entity-type="concept" data-canonical="義">義</span>，失<span class="entity entity-concept" data-entity-type="concept" data-canonical="義">義</span>而後<span class="entity entity-concept" data-entity-type="concept" data-canonical="禮">禮</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> 夫<span class="entity entity-concept" data-entity-type="concept" data-canonical="禮">禮</span>者，忠<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>之薄，而亂之首。</p>
<p><a id="pn-7" class="pn">[7]</a> 前識者，<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>之華，而愚之始。</p>
<p><a id="pn-8" class="pn">[8]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="大丈夫">大丈夫</span>處其厚，不居其薄；處其實，不居其華。</p>
<p><a id="pn-9" class="pn">[9]</a> 故去彼取此。</p>
</article>
