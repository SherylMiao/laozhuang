<article class="reader-article">
<h2>第七十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> 民不畏威，則<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>威至。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>狎其所居，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>厭其所生。</p>
<p><a id="pn-3" class="pn">[3]</a> 夫唯不厭，是以不厭。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>自知不自見；自愛不自貴。</p>
<p><a id="pn-5" class="pn">[5]</a> 故去彼取此。</p>
</article>
