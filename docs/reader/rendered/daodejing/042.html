<h2>第四十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>生<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>生二，二生三，三生<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>負陰而抱陽，<span class="entity entity-concept" data-entity-type="concept" data-canonical="沖">沖</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="氣">氣</span>以為<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 人之所惡，唯孤、寡、不穀，而王公以為稱。</p>
<p><a id="pn-4" class="pn">[4]</a> 故物或損之而益，或益之而損。</p>
<p><a id="pn-5" class="pn">[5]</a> 人之所教，我亦教之。</p>
<p><a id="pn-6" class="pn">[6]</a> 強梁者不得其死，吾將以為教父。</p>
