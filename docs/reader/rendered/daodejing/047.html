<h2>第四十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> 不出戶知<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>；不闚牖見<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 其出彌遠，其知彌少。</p>
<p><a id="pn-3" class="pn">[3]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>不行而知，不見而名，不為而成。</p>
</article>
