<h2>第三十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> 夫佳兵者，不祥之器，物或惡之，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者不處。</p>
<p><a id="pn-2" class="pn">[2]</a> 君子居則貴左，用兵則貴右。</p>
<p><a id="pn-3" class="pn">[3]</a> 兵者不祥之器，非君子之器，不得已而用之，恬淡為上。</p>
<p><a id="pn-4" class="pn">[4]</a> 勝而不美，而美之者，是樂殺人。</p>
<p><a id="pn-5" class="pn">[5]</a> 夫樂殺人者，則不可以得志於<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>矣。</p>
<p><a id="pn-6" class="pn">[6]</a> 吉事尚左，凶事尚右。</p>
<p><a id="pn-7" class="pn">[7]</a> 偏將軍居左，上將軍居右，言以喪<span class="entity entity-concept" data-entity-type="concept" data-canonical="禮">禮</span>處之。</p>
<p><a id="pn-8" class="pn">[8]</a> 殺人之衆，以哀悲泣之，戰勝以喪<span class="entity entity-concept" data-entity-type="concept" data-canonical="禮">禮</span>處之。</p>
</article>
