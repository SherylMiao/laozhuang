<h2>第三十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 將欲歙之，必固張之；將欲弱之，必固強之；將欲廢之，必固興之；將欲奪之，必固與之。</p>
<p><a id="pn-2" class="pn">[2]</a> 是謂微明。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="柔弱">柔弱</span>勝剛強。</p>
<p><a id="pn-4" class="pn">[4]</a> 魚不可脫於淵，國之利器不可以示人。</p>
</article>
