<h2>第十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 絕聖棄<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>，民利百倍；絕<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>棄<span class="entity entity-concept" data-entity-type="concept" data-canonical="義">義</span>，民復孝慈；絕巧棄利，盜賊<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 此三者以為文不足。</p>
<p><a id="pn-3" class="pn">[3]</a> 故令<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>所屬：見素抱<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>，少私寡欲。</p>
