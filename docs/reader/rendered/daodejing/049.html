<h2>第四十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>常心，以<span class="entity entity-identity" data-entity-type="identity" data-canonical="百姓">百姓</span>心為心。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>者，吾<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>之；<span class="entity entity-concept" data-entity-type="concept" data-canonical="不善">不善</span>者，吾亦<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>之；<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>者，吾<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>之；不<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>者，吾亦<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>之；<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>在<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，歙歙為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>渾其心，<span class="entity entity-identity" data-entity-type="identity" data-canonical="百姓">百姓</span>皆注其耳目，<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>皆孩之。</p>
