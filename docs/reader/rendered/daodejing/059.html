<h2>第五十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 治人事<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>莫若嗇。</p>
<p><a id="pn-2" class="pn">[2]</a> 夫唯嗇，是謂早服；早服謂之重積<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>；重積<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>則<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>不克；<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>不克則莫知其極；莫知其極，可以<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>國；<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>國之<span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>，可以長久；是謂深根固柢，長生久視之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
</article>
