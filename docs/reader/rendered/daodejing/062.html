<h2>第六十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>之奧。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="善人">善人</span>之寶，<span class="entity entity-identity" data-entity-type="identity" data-canonical="不善人">不善人</span>之所保。</p>
<p><a id="pn-3" class="pn">[3]</a> 美言可以市，尊行可以加人。</p>
<p><a id="pn-4" class="pn">[4]</a> 人之<span class="entity entity-concept" data-entity-type="concept" data-canonical="不善">不善</span>，何棄之<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>？</p>
<p><a id="pn-5" class="pn">[5]</a> 故立<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>子，置三公，雖<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>拱璧以先駟馬，不如坐進此<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> 古之所以貴此<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者何？</p>
<p><a id="pn-7" class="pn">[7]</a> 不曰：以求得，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>罪以免耶？</p>
<p><a id="pn-8" class="pn">[8]</a> 故為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>貴。</p>
</article>
