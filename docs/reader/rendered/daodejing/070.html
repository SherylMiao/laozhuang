<article class="reader-article">
<h2>第七十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 吾言甚易知，甚易行。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫能知，莫能行。</p>
<p><a id="pn-3" class="pn">[3]</a> 言<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>宗，事<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>君。</p>
<p><a id="pn-4" class="pn">[4]</a> 夫唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>知，是以不我知。</p>
<p><a id="pn-5" class="pn">[5]</a> 知我者希，則我者貴。</p>
<p><a id="pn-6" class="pn">[6]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>被褐懷玉。</p>
</article>
