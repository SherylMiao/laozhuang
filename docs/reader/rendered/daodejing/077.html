<h2>第七十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，其猶張弓與？</p>
<p><a id="pn-2" class="pn">[2]</a> 高者抑之，下者舉之；<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘者損之，不足者補之。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，損<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘而補不足。</p>
<p><a id="pn-4" class="pn">[4]</a> 人之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，則不然，損不足以奉<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘。</p>
<p><a id="pn-5" class="pn">[5]</a> 孰能<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘以奉<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者。</p>
<p><a id="pn-6" class="pn">[6]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>為而不恃，功成而不處，其不欲見賢。</p>
</article>
