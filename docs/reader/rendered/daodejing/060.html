<h2>第六十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 治<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國若烹<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>鮮。</p>
<p><a id="pn-2" class="pn">[2]</a> 以<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>蒞<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，其鬼不神；非其鬼不神，其神不傷人；非其神不傷人，<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>亦不傷人。</p>
<p><a id="pn-3" class="pn">[3]</a> 夫兩不相傷，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>交歸焉。</p>
</article>
