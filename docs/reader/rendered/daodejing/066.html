<h2>第六十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 江海所以能為百<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>王者，以其<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>下之，故能為百<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>王。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>欲上民，必以言下之；欲先民，必以身後之。</p>
<p><a id="pn-3" class="pn">[3]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>處上而民不重，處前而民不害。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>樂推而不厭。</p>
<p><a id="pn-5" class="pn">[5]</a> 以其<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>，故<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫能與之爭。</p>
</article>
