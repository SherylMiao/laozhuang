<h2>第四十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> 上士聞<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，勤而行之；中士聞<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，若存若亡；下士聞<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>笑之。</p>
<p><a id="pn-2" class="pn">[2]</a> 不笑不足以為<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 故建言<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>之：明<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>若昧；進<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>若退；夷<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>若纇；<span class="entity entity-concept" data-entity-type="concept" data-canonical="上德">上德</span>若<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>；太白若辱；廣<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>若不足；建<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>若偷；質真若渝；<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>方<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>隅；<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>器晚成；<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>音希聲；<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>象<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>形；<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>隱<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>名。</p>
<p><a id="pn-4" class="pn">[4]</a> 夫唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>貸且成。</p>
</article>
