<h2>第二十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 將欲取<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>而為之，吾見其不得已。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>神器，不可為也，為者敗之，執者失之。</p>
<p><a id="pn-3" class="pn">[3]</a> 故物或行或隨；或歔或吹；或強或羸；或挫或隳。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>去甚，去奢，去泰。</p>
</article>
