<h2>第九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 持而盈之，不如其已；揣而銳之，不可長保。</p>
<p><a id="pn-2" class="pn">[2]</a> 金玉滿堂，莫之能守；富貴而驕，自遺其咎。</p>
<p><a id="pn-3" class="pn">[3]</a> 功遂身退<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
</article>
