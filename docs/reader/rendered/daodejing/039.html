<h2>第三十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 昔之得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>者：<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以清；<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以寧；神得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以靈；<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以盈；<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以生；<span class="entity entity-identity" data-entity-type="identity" data-canonical="侯王">侯王</span>得<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>以為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>貞。</p>
<p><a id="pn-2" class="pn">[2]</a> 其致之，<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以清，將恐裂；<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以寧，將恐發；神<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以靈，將恐歇；<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以盈，將恐竭；<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以生，將恐滅；<span class="entity entity-identity" data-entity-type="identity" data-canonical="侯王">侯王</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以貴高將恐蹶。</p>
<p><a id="pn-3" class="pn">[3]</a> 故貴以賤為本，高以下為基。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="侯王">侯王</span>自稱孤、寡、不穀。</p>
<p><a id="pn-5" class="pn">[5]</a> 此非以賤為本耶？</p>
<p><a id="pn-6" class="pn">[6]</a> 非乎？</p>
<p><a id="pn-7" class="pn">[7]</a> 故致數譽<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>譽。</p>
<p><a id="pn-8" class="pn">[8]</a> 不欲琭琭如玉，珞珞如石。</p>
</article>
