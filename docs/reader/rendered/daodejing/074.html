<h2>第七十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> 民不畏死，奈何以死懼之？</p>
<p><a id="pn-2" class="pn">[2]</a> 若使民常畏死，而為奇者，吾得執而殺之，孰敢？</p>
<p><a id="pn-3" class="pn">[3]</a> 常<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>司殺者殺。</p>
<p><a id="pn-4" class="pn">[4]</a> 夫司殺者，是<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>匠斲；夫代<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>匠斲者，希<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>不傷其手矣。</p>
</article>
