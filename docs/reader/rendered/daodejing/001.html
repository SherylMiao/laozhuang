<h2>第一章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>可<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，非常<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 名可名，非常名。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>名<span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>之始；<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>名<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> 故常<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>欲，以觀其妙；常<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>欲，以觀其徼。</p>
<p><a id="pn-5" class="pn">[5]</a> 此兩者，同出而異名，同謂之<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>之又<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>，衆妙之門。</p>
