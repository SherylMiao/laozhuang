<h2>第五十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 使我介然<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>知，行於<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，唯施是畏。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>甚夷，而民好徑。</p>
<p><a id="pn-3" class="pn">[3]</a> 朝甚除，田甚蕪，倉甚虛；服文綵，帶利劍，厭飲食，財貨<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘；是謂盜夸。</p>
<p><a id="pn-4" class="pn">[4]</a> 非<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>也哉！</p>
