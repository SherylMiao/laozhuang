<h2>第七十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 勇於敢則殺，勇於不敢則活。</p>
<p><a id="pn-2" class="pn">[2]</a> 此兩者，或利或害。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之所惡，孰知其故？</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>猶難之。</p>
<p><a id="pn-5" class="pn">[5]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>而<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>勝，不言而<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>應，不召而自來，繟然而<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>謀。</p>
<p><a id="pn-6" class="pn">[6]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>網恢恢，踈而不失。</p>
</article>
