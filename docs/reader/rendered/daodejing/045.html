<h2>第四十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>成若缺，其用不弊。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>盈若<span class="entity entity-concept" data-entity-type="concept" data-canonical="沖">沖</span>，其用不窮。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>直若屈，<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>巧若拙，<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>辯若訥。</p>
<p><a id="pn-4" class="pn">[4]</a> 躁勝寒靜勝熱。</p>
<p><a id="pn-5" class="pn">[5]</a> 清靜為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>正。</p>
