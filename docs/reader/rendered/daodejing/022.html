<h2>第二十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> 曲則全，枉則直，窪則盈，弊則新，少則得，多則惑。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>抱<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>式。</p>
<p><a id="pn-3" class="pn">[3]</a> 不自見，故明；不自是，故彰；不自伐，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>功；不自矜，故長。</p>
<p><a id="pn-4" class="pn">[4]</a> 夫唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>，故<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫能與之爭。</p>
<p><a id="pn-5" class="pn">[5]</a> 古之所謂曲則全者，豈虛言哉！</p>
<p><a id="pn-6" class="pn">[6]</a> 誠全而歸之。</p>
</article>
