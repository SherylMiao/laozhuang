<h2>第二十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>行<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>轍迹，<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>言<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>瑕讁；<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>數不用籌策；<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>閉<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>關楗而不可開，<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>結<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>繩約而不可解。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>常<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>救人，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>棄人；常<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>救物，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>棄物。</p>
<p><a id="pn-3" class="pn">[3]</a> 是謂襲明。</p>
<p><a id="pn-4" class="pn">[4]</a> 故<span class="entity entity-identity" data-entity-type="identity" data-canonical="善人">善人</span>者，<span class="entity entity-identity" data-entity-type="identity" data-canonical="不善人">不善人</span>之師；<span class="entity entity-identity" data-entity-type="identity" data-canonical="不善人">不善人</span>者，<span class="entity entity-identity" data-entity-type="identity" data-canonical="善人">善人</span>之資。</p>
<p><a id="pn-5" class="pn">[5]</a> 不貴其師，不愛其資，雖<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>迷，是謂要妙。</p>
