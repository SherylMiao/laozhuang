<h2>第四十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>之至柔，馳騁<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>之至堅。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>入<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>間，吾是以知<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>益。</p>
<p><a id="pn-3" class="pn">[3]</a> 不言之教，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>之益，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>希及之。</p>
