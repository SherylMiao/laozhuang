<article class="reader-article">
<h2>第五十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> 其政悶悶，其民淳淳；其政察察，其民缺缺。</p>
<p><a id="pn-2" class="pn">[2]</a> 禍兮福之所倚，福兮禍之所伏。</p>
<p><a id="pn-3" class="pn">[3]</a> 孰知其極？</p>
<p><a id="pn-4" class="pn">[4]</a> 其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>正。</p>
<p><a id="pn-5" class="pn">[5]</a> 正復為奇，<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>復為妖。</p>
<p><a id="pn-6" class="pn">[6]</a> 人之迷，其日固久。</p>
<p><a id="pn-7" class="pn">[7]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>方而不割，廉而不劌，直而不肆，光而不燿。</p>
</article>
