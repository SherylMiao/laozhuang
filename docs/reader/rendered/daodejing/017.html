<h2>第十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> 太上，下知<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>之；其次，親而譽之；其次，畏之；其次，侮之。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>不足，焉<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>不<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>焉。</p>
<p><a id="pn-3" class="pn">[3]</a> 悠兮，其貴言。</p>
<p><a id="pn-4" class="pn">[4]</a> 功成事遂，<span class="entity entity-identity" data-entity-type="identity" data-canonical="百姓">百姓</span>皆謂我<span class="entity entity-concept" data-entity-type="concept" data-canonical="自然">自然</span>。</p>
</article>
