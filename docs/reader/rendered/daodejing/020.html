<article class="reader-article">
<h2>第二十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 絕學<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>憂，唯之與阿，相去幾何？</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>之與惡，相去若何？</p>
<p><a id="pn-3" class="pn">[3]</a> 人之所畏，不可不畏。</p>
<p><a id="pn-4" class="pn">[4]</a> 荒兮其未央哉！</p>
<p><a id="pn-5" class="pn">[5]</a> 衆人熙熙，如享太牢，如春登臺。</p>
<p><a id="pn-6" class="pn">[6]</a> 我獨怕兮其未兆；如<span class="entity entity-concept" data-entity-type="concept" data-canonical="嬰兒">嬰兒</span>之未孩；儽儽兮若<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所歸。</p>
<p><a id="pn-7" class="pn">[7]</a> 衆人皆<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘，而我獨若遺。</p>
<p><a id="pn-8" class="pn">[8]</a> 我愚人之心也哉！</p>
<p><a id="pn-9" class="pn">[9]</a> 沌沌兮，俗人昭昭，我獨若昏。</p>
<p><a id="pn-10" class="pn">[10]</a> 俗人察察，我獨悶悶。</p>
<p><a id="pn-11" class="pn">[11]</a> 澹兮其若海，飂兮若<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>止，衆人皆<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>以，而我獨頑似鄙。</p>
<p><a id="pn-12" class="pn">[12]</a> 我獨異於人，而貴食<span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>。</p>
</article>
