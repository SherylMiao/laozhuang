<h2>第十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-quantity" data-entity-type="quantity" data-canonical="三十輻">三十輻</span>，共<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>轂，當其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>車之用。</p>
<p><a id="pn-2" class="pn">[2]</a> 埏埴以為器，當其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>器之用。</p>
<p><a id="pn-3" class="pn">[3]</a> 鑿戶牖以為室，當其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>室之用。</p>
<p><a id="pn-4" class="pn">[4]</a> 故<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>之以為利，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>之以為用。</p>
</article>
