<article class="reader-article">
<h2>第三十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 知人者<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>，自知者明。</p>
<p><a id="pn-2" class="pn">[2]</a> 勝人者<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>力，自勝者強。</p>
<p><a id="pn-3" class="pn">[3]</a> 知足者富。</p>
<p><a id="pn-4" class="pn">[4]</a> 強行者<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>志。</p>
<p><a id="pn-5" class="pn">[5]</a> 不失其所者久。</p>
<p><a id="pn-6" class="pn">[6]</a> 死而不亡者壽。</p>
</article>
