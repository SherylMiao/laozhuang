<h2>第六十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>為士者，不武；<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>戰者，不怒；<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>勝敵者，不與；<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>用人者，為之下。</p>
<p><a id="pn-2" class="pn">[2]</a> 是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>，是謂用人之力，是謂配<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>古之極。</p>
</article>
