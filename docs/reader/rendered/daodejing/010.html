<h2>第十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 載營魄抱<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>，能<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>離乎？</p>
<p><a id="pn-2" class="pn">[2]</a> 專<span class="entity entity-concept" data-entity-type="concept" data-canonical="氣">氣</span>致柔，能<span class="entity entity-concept" data-entity-type="concept" data-canonical="嬰兒">嬰兒</span>乎？</p>
<p><a id="pn-3" class="pn">[3]</a> 滌除<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>覽，能<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>疵乎？</p>
<p><a id="pn-4" class="pn">[4]</a> 愛民治國，能<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>知乎？</p>
<p><a id="pn-5" class="pn">[5]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>門開闔，能為雌乎？</p>
<p><a id="pn-6" class="pn">[6]</a> 明白四達，能<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>知乎？</p>
<p><a id="pn-7" class="pn">[7]</a> 生之、畜之，生而不<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>，為而不恃，長而不宰，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄德">玄德</span>。</p>
