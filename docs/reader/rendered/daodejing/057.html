<h2>第五十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> 以正治國，以奇用兵，以<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>事取<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 吾何以知其然哉？</p>
<p><a id="pn-3" class="pn">[3]</a> 以此：<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>多忌諱，而民彌貧；民多利器，國家滋昏；人多伎巧，奇物滋起；法令滋彰，盜賊多<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> 故<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>云：我<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>，而民自化；我好靜，而民自正；我<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>事，而民自富；我<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>欲，而民自<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>。</p>
