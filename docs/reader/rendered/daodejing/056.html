<h2>第五十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 知者不言，言者不知。</p>
<p><a id="pn-2" class="pn">[2]</a> 塞其兑，閉其門，挫其銳，解其分，<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>其光，同其塵，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>同。</p>
<p><a id="pn-3" class="pn">[3]</a> 故不可得而親，不可得而踈；不可得而利，不可得而害；不可得而貴，不可得而賤。</p>
<p><a id="pn-4" class="pn">[4]</a> 故為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>貴。</p>
</article>
