<h2>第五十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>建不拔，<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>抱者不脫，子孫以祭祀不輟。</p>
<p><a id="pn-2" class="pn">[2]</a> 修之於身，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>乃真；修之於家，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>乃餘；修之於鄉，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>乃長；修之於國，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>乃豐；修之於<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>乃普。</p>
<p><a id="pn-3" class="pn">[3]</a> 故以身觀身，以家觀家，以鄉觀鄉，以國觀國，以<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>觀<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> 吾何以知<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>然哉？</p>
<p><a id="pn-5" class="pn">[5]</a> 以此。</p>
</article>
