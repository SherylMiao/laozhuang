<h2>第十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> 古之<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>為士者，微妙<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span>通，深不可識。</p>
<p><a id="pn-2" class="pn">[2]</a> 夫唯不可識，故強為之容。</p>
<p><a id="pn-3" class="pn">[3]</a> 豫兮若冬涉川；猶兮若畏四鄰；儼兮其若容；渙兮若冰之將釋；敦兮其若<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>；曠兮其若<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>；混兮其若濁；孰能濁以靜之徐清？</p>
<p><a id="pn-4" class="pn">[4]</a> 孰能安以久動之徐生？</p>
<p><a id="pn-5" class="pn">[5]</a> 保此<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者，不欲盈。</p>
<p><a id="pn-6" class="pn">[6]</a> 夫唯不盈，故能蔽不新成。</p>
</article>
