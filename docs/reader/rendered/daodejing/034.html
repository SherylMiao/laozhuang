<h2>第三十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>汎兮，其可左右。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>恃之而生而不辭，功成不名<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 衣養<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>而不為主，常<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>欲，可名於<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>；<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>歸焉，而不為主，可名為<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> 以其終不自為<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，故能成其<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
