<h2>第八十章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>國寡民。</p>
<p><a id="pn-2" class="pn">[2]</a> 使<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>什伯之器而不用；使民重死而不遠徙。</p>
<p><a id="pn-3" class="pn">[3]</a> 雖<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>舟輿，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所乘之，雖<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>甲兵，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所陳之。</p>
<p><a id="pn-4" class="pn">[4]</a> 使民復結繩而用之，甘其食，美其服，安其居，樂其俗。</p>
<p><a id="pn-5" class="pn">[5]</a> 鄰國相望，雞犬之聲相聞，民至老死，不相往來。</p>
</article>
