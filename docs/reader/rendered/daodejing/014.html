<h2>第十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> 視之不見，名曰夷；聽之不聞，名曰希；搏之不得，名曰微。</p>
<p><a id="pn-2" class="pn">[2]</a> 此三者不可致詰，故混而為<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 其上不皦，其下不昧。</p>
<p><a id="pn-4" class="pn">[4]</a> 繩繩不可名，復歸於<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>物。</p>
<p><a id="pn-5" class="pn">[5]</a> 是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>狀之狀，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>物之象，是謂惚恍。</p>
<p><a id="pn-6" class="pn">[6]</a> 迎之不見其首，隨之不見其後。</p>
<p><a id="pn-7" class="pn">[7]</a> 執古之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，以御今之<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>。</p>
<p><a id="pn-8" class="pn">[8]</a> 能知古始，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>紀。</p>
</article>
