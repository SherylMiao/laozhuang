<h2>第四章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="沖">沖</span>而用之或不盈。</p>
<p><a id="pn-2" class="pn">[2]</a> 淵兮似<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>之宗。</p>
<p><a id="pn-3" class="pn">[3]</a> 挫其銳，解其紛，<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>其光，同其塵。</p>
<p><a id="pn-4" class="pn">[4]</a> 湛兮似或存。</p>
<p><a id="pn-5" class="pn">[5]</a> 吾不知誰之子，象帝之先。</p>
</article>
