<h2>第六十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> 用兵<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>言：吾不敢為主，而為客；不敢進寸，而退尺。</p>
<p><a id="pn-2" class="pn">[2]</a> 是謂行<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>行；攘<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>臂；扔<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>敵；執<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>兵。</p>
<p><a id="pn-3" class="pn">[3]</a> 禍莫<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>於輕敵，輕敵幾喪吾寶。</p>
<p><a id="pn-4" class="pn">[4]</a> 故抗兵相加，哀者勝矣。</p>
