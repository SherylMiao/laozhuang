<h2>第二十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> 企者不立；跨者不行；自見者不明；自是者不彰；自伐者<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>功；自矜者不長。</p>
<p><a id="pn-2" class="pn">[2]</a> 其在<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>也，曰：餘食贅行。</p>
<p><a id="pn-3" class="pn">[3]</a> 物或惡之，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者不處。</p>
</article>
