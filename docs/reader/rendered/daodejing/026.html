<h2>第二十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 重為輕根，靜為躁君。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>終日行不離輜重。</p>
<p><a id="pn-3" class="pn">[3]</a> 雖<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>榮觀，燕處超然。</p>
<p><a id="pn-4" class="pn">[4]</a> 奈何萬乘之主，而以身輕<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>？</p>
<p><a id="pn-5" class="pn">[5]</a> 輕則失本，躁則失君。</p>
</article>
