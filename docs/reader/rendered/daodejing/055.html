<h2>第五十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> 含<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>之厚，比於赤子。</p>
<p><a id="pn-2" class="pn">[2]</a> 蜂蠆虺蛇不螫，猛獸不據，攫鳥不搏。</p>
<p><a id="pn-3" class="pn">[3]</a> 骨弱筋柔而握固。</p>
<p><a id="pn-4" class="pn">[4]</a> 未知<span class="entity entity-concept" data-entity-type="concept" data-canonical="牝">牝</span>牡之合而全作，精之至也。</p>
<p><a id="pn-5" class="pn">[5]</a> 終日號而不嗄，<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>之至也。</p>
<p><a id="pn-6" class="pn">[6]</a> 知<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>曰常，知常曰明，益生曰祥。</p>
<p><a id="pn-7" class="pn">[7]</a> 心使<span class="entity entity-concept" data-entity-type="concept" data-canonical="氣">氣</span>曰強。</p>
<p><a id="pn-8" class="pn">[8]</a> 物壯則老，謂之不<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，不<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>早已。</p>
</article>
