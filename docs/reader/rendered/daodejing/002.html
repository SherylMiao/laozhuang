<h2>第二章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>皆知美之為美，斯惡已。</p>
<p><a id="pn-2" class="pn">[2]</a> 皆知<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>之為<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>，斯<span class="entity entity-concept" data-entity-type="concept" data-canonical="不善">不善</span>已。</p>
<p><a id="pn-3" class="pn">[3]</a> 故<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>相生，難易相成，長短相較，高下相傾，音聲相<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>，前後相隨。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>處<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>之事，行不言之教；<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>作焉而不辭，生而不<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>。</p>
<p><a id="pn-5" class="pn">[5]</a> 為而不恃，功成而弗居。</p>
<p><a id="pn-6" class="pn">[6]</a> 夫唯弗居，是以不去。</p>
</article>
