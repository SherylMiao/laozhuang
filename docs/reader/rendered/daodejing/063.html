<h2>第六十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 為<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>，事<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>事，味<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>味。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>多少，報怨以<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 圖難於其易，為<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>於其細；<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>難事，必作於易，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>事，必作於細。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>終不為<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，故能成其<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
<p><a id="pn-5" class="pn">[5]</a> 夫輕諾必寡<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>，多易必多難。</p>
<p><a id="pn-6" class="pn">[6]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>猶難之，故終<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>難矣。</p>
