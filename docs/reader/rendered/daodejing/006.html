<h2>第六章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>神不死，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="牝">牝</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="玄">玄</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="牝">牝</span>之門，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>根。</p>
<p><a id="pn-3" class="pn">[3]</a> 綿綿若存，用之不勤。</p>
