<article class="reader-article">
<h2>第六十七章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>皆謂我<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，似不肖。</p>
<p><a id="pn-2" class="pn">[2]</a> 夫唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，故似不肖。</p>
<p><a id="pn-3" class="pn">[3]</a> 若肖久矣。</p>
<p><a id="pn-4" class="pn">[4]</a> 其細也夫！</p>
<p><a id="pn-5" class="pn">[5]</a> 我<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>三寶，持而保之。</p>
<p><a id="pn-6" class="pn">[6]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>曰慈，二曰儉，三曰不敢為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>先。</p>
<p><a id="pn-7" class="pn">[7]</a> 慈故能勇；儉故能廣；不敢為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>先，故能成器長。</p>
<p><a id="pn-8" class="pn">[8]</a> 今舍慈且勇；舍儉且廣；舍後且先；死矣！</p>
<p><a id="pn-9" class="pn">[9]</a> 夫慈以戰則勝，以守則固。</p>
<p><a id="pn-10" class="pn">[10]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>將救之，以慈衛之。</p>
</article>
