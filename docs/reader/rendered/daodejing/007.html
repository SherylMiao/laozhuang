<h2>第七章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>長<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>久。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>所以能長且久者，以其不自生，故能長生。</p>
<p><a id="pn-3" class="pn">[3]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>後其身而身先；外其身而身存。</p>
<p><a id="pn-4" class="pn">[4]</a> 非以其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>私耶？</p>
<p><a id="pn-5" class="pn">[5]</a> 故能成其私。</p>
</article>
