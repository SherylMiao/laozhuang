<h2>第二十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> 孔<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>之容，唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>是從。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>之為物，唯恍唯惚。</p>
<p><a id="pn-3" class="pn">[3]</a> 忽兮恍兮，其中<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>象；恍兮忽兮，其中<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>物。</p>
<p><a id="pn-4" class="pn">[4]</a> 窈兮冥兮，其中<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>精；其精甚真，其中<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>。</p>
<p><a id="pn-5" class="pn">[5]</a> 自古及今，其名不去，以閱衆甫。</p>
<p><a id="pn-6" class="pn">[6]</a> 吾何以知衆甫之狀哉？</p>
<p><a id="pn-7" class="pn">[7]</a> 以此。</p>
</article>
