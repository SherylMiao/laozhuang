<h2>第四十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，卻走馬以糞。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，戎馬生於郊。</p>
<p><a id="pn-3" class="pn">[3]</a> 禍莫<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>於不知足；咎莫<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>於欲得。</p>
<p><a id="pn-4" class="pn">[4]</a> 故知足之足，常足矣。</p>
