<h2>第五十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 出生入死。</p>
<p><a id="pn-2" class="pn">[2]</a> 生之徒，十<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>三；死之徒，十<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>三；人之生，動之死<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>，十<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>三。</p>
<p><a id="pn-3" class="pn">[3]</a> 夫何故？</p>
<p><a id="pn-4" class="pn">[4]</a> 以其生，生之厚。</p>
<p><a id="pn-5" class="pn">[5]</a> 蓋聞<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>攝生者，陸行不遇兕虎，入軍不被甲兵；兕<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所投其角，虎<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所措其爪，兵<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>所容其刃。</p>
<p><a id="pn-6" class="pn">[6]</a> 夫何故？</p>
<p><a id="pn-7" class="pn">[7]</a> 以其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>死<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>。</p>
</article>
