<article class="reader-article">
<h2>第三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 不尚賢，使民<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>；不貴難得之貨，使民不為盜；不見可欲，使心不亂。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>之治，虛其心，實其腹，弱其志，強其骨。</p>
<p><a id="pn-3" class="pn">[3]</a> 常使民<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>知<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>欲。</p>
<p><a id="pn-4" class="pn">[4]</a> 使<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>知者不敢為也。</p>
<p><a id="pn-5" class="pn">[5]</a> 為<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>，則<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>不治。</p>
</article>
