<h2>第五十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>生之，<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>畜之，物形之，勢成之。</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>莫不尊<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>而貴<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>之尊，<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>之貴，夫莫之命常<span class="entity entity-concept" data-entity-type="concept" data-canonical="自然">自然</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> 故<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>生之，<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>畜之；長之育之；亭之毒之；養之覆之。</p>
<p><a id="pn-5" class="pn">[5]</a> 生而不<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>，為而不恃，長而不宰，是謂<span class="entity entity-concept" data-entity-type="concept" data-canonical="玄德">玄德</span>。</p>
</article>
