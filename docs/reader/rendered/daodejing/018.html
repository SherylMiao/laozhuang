<h2>第十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>廢，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="義">義</span>；<span class="entity entity-concept" data-entity-type="concept" data-canonical="智">智</span>慧出，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>偽；六親不<span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>孝慈；國家昏亂，<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>忠臣。</p>
