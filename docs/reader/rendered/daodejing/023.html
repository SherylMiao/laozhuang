<h2>第二十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 希言<span class="entity entity-concept" data-entity-type="concept" data-canonical="自然">自然</span>，故飄風不終朝，驟雨不終日。</p>
<p><a id="pn-2" class="pn">[2]</a> 孰為此者？</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>尚不能久，而況於人乎？</p>
<p><a id="pn-5" class="pn">[5]</a> 故從事於<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者，<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者，同於<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>；<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>者，同於<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>；失者，同於失。</p>
<p><a id="pn-6" class="pn">[6]</a> 同於<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>者，<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>亦樂得之；同於<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>者，<span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>亦樂得之；同於失者，失亦樂得之。</p>
<p><a id="pn-7" class="pn">[7]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>不足，焉<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>不<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>焉。</p>
</article>
