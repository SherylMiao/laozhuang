<article class="reader-article">
<h2>第十三章</h2>
<p><a id="pn-1" class="pn">[1]</a> 寵辱若驚，貴<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>患若身。</p>
<p><a id="pn-2" class="pn">[2]</a> 何謂寵辱若驚？</p>
<p><a id="pn-3" class="pn">[3]</a> 寵為下，得之若驚，失之若驚，是謂寵辱若驚。</p>
<p><a id="pn-4" class="pn">[4]</a> 何謂貴<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>患若身？</p>
<p><a id="pn-5" class="pn">[5]</a> 吾所以<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>患者，為吾<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>身，及吾<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>身，吾<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>何患？</p>
<p><a id="pn-6" class="pn">[6]</a> 故貴以身為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，若可寄<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>；愛以身為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，若可託<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>。</p>
</article>
