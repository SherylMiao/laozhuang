<h2>第三十章</h2>
<p><a id="pn-1" class="pn">[1]</a> 以<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>佐人主者，不以兵強<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 其事好還。</p>
<p><a id="pn-3" class="pn">[3]</a> 師之所處，荊棘生焉。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>軍之後，必<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>凶年。</p>
<p><a id="pn-5" class="pn">[5]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>果而已，不敢以取強。</p>
<p><a id="pn-6" class="pn">[6]</a> 果而勿矜，果而勿伐，果而勿驕。</p>
<p><a id="pn-7" class="pn">[7]</a> 果而不得已，果而勿強。</p>
<p><a id="pn-8" class="pn">[8]</a> 物壯則老，是謂不<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，不<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>早已。</p>
</article>
