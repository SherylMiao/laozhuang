<h2>第二十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> 知其雄，守其雌，為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>谿。</p>
<p><a id="pn-2" class="pn">[2]</a> 為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>谿，<span class="entity entity-concept" data-entity-type="concept" data-canonical="常德">常德</span>不離，復歸於<span class="entity entity-concept" data-entity-type="concept" data-canonical="嬰兒">嬰兒</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 知其白，守其黑，為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>式。</p>
<p><a id="pn-4" class="pn">[4]</a> 為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>式，<span class="entity entity-concept" data-entity-type="concept" data-canonical="常德">常德</span>不忒，復歸於<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>極。</p>
<p><a id="pn-5" class="pn">[5]</a> 知其榮，守其辱，為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> 為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="常德">常德</span>乃足，復歸於<span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>。</p>
<p><a id="pn-7" class="pn">[7]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="樸">樸</span>散則為器，<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>用之，則為官長，故<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>制不割。</p>
