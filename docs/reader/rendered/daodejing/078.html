<h2>第七十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫<span class="entity entity-concept" data-entity-type="concept" data-canonical="柔弱">柔弱</span>於<span class="entity entity-concept" data-entity-type="concept" data-canonical="水">水</span>，而攻堅強者莫之能勝，其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以易之。</p>
<p><a id="pn-2" class="pn">[2]</a> 弱之勝強，柔之勝剛，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫不知，莫能行。</p>
<p><a id="pn-3" class="pn">[3]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>云：受國之垢，是謂社稷主；受國不祥，是謂<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>王。</p>
<p><a id="pn-4" class="pn">[4]</a> 正言若反。</p>
</article>
