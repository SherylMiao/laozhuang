<h2>第七十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 人之生也<span class="entity entity-concept" data-entity-type="concept" data-canonical="柔弱">柔弱</span>，其死也堅強。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>草木之生也柔脆，其死也枯槁。</p>
<p><a id="pn-3" class="pn">[3]</a> 故堅強者死之徒，<span class="entity entity-concept" data-entity-type="concept" data-canonical="柔弱">柔弱</span>者生之徒。</p>
<p><a id="pn-4" class="pn">[4]</a> 是以兵強則不勝，木強則共。</p>
<p><a id="pn-5" class="pn">[5]</a> 強<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>處下，<span class="entity entity-concept" data-entity-type="concept" data-canonical="柔弱">柔弱</span>處上。</p>
</article>
