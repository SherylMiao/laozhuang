<h2>第七十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> 知不知上；不知知病。</p>
<p><a id="pn-2" class="pn">[2]</a> 夫唯病病，是以不病。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>不病，以其病病，是以不病。</p>
</article>
