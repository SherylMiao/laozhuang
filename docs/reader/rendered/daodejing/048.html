<h2>第四十八章</h2>
<p><a id="pn-1" class="pn">[1]</a> 為學日益，為<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>日損。</p>
<p><a id="pn-2" class="pn">[2]</a> 損之又損，以至於<span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>而<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>不為。</p>
<p><a id="pn-4" class="pn">[4]</a> 取<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>常以<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>事，及其<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>事，不足以取<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>。</p>
