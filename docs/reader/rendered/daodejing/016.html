<h2>第十六章</h2>
<p><a id="pn-1" class="pn">[1]</a> 致虛極，守靜篤。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>並作，吾以觀復。</p>
<p><a id="pn-3" class="pn">[3]</a> 夫物芸芸，各復歸其根。</p>
<p><a id="pn-4" class="pn">[4]</a> 歸根曰靜，是謂復命。</p>
<p><a id="pn-5" class="pn">[5]</a> 復命曰常，知常曰明。</p>
<p><a id="pn-6" class="pn">[6]</a> 不知常，妄作凶。</p>
<p><a id="pn-7" class="pn">[7]</a> 知常容，容乃公，公乃王，王乃<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>乃<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>乃久，沒身不殆。</p>
</article>
