<h2>第二十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>物混成，先<span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>生。</p>
<p><a id="pn-2" class="pn">[2]</a> 寂兮寥兮，獨立不改，周行而不殆，可以為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 吾不知其名，字之曰<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，強為之名曰<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>曰逝，逝曰遠，遠曰反。</p>
<p><a id="pn-5" class="pn">[5]</a> 故<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，王亦<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
<p><a id="pn-6" class="pn">[6]</a> 域中<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>四<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>，而王居其<span class="entity entity-concept" data-entity-type="concept" data-canonical="一">一</span>焉。</p>
<p><a id="pn-7" class="pn">[7]</a> 人法<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="地">地</span>法<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>法<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>法<span class="entity entity-concept" data-entity-type="concept" data-canonical="自然">自然</span>。</p>
