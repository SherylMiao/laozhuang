<h2>第七十九章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="和">和</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>怨，必<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>餘怨；安可以為<span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>？</p>
<p><a id="pn-2" class="pn">[2]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>執左契，而不責於人。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>司契，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="德">德</span>司徹。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>親，常與<span class="entity entity-identity" data-entity-type="identity" data-canonical="善人">善人</span>。</p>
