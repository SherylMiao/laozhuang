<h2>第七十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> 民之飢，以其上食稅之多，是以飢。</p>
<p><a id="pn-2" class="pn">[2]</a> 民之難治，以其上之<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>為，是以難治。</p>
<p><a id="pn-3" class="pn">[3]</a> 民之輕死，以其求生之厚，是以輕死。</p>
<p><a id="pn-4" class="pn">[4]</a> 夫唯<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>以生為者，是賢於貴生。</p>
</article>
