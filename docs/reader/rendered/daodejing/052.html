<h2>第五十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>始，以為<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> 既知其<span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>，復知其子，既知其子，復守其<span class="entity entity-concept" data-entity-type="concept" data-canonical="母">母</span>，沒其不殆。</p>
<p><a id="pn-3" class="pn">[3]</a> 塞其兌，閉其門，終身不勤。</p>
<p><a id="pn-4" class="pn">[4]</a> 開其兌，濟其事，終身不救。</p>
<p><a id="pn-5" class="pn">[5]</a> 見<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>曰明，守柔曰強。</p>
<p><a id="pn-6" class="pn">[6]</a> 用其光，復歸其明，<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>遺身殃；是為習常。</p>
</article>
