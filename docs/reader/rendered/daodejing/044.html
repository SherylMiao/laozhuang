<h2>第四十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> 名與身孰親？</p>
<p><a id="pn-2" class="pn">[2]</a> 身與貨孰多？</p>
<p><a id="pn-3" class="pn">[3]</a> 得與亡孰病？</p>
<p><a id="pn-4" class="pn">[4]</a> 是故甚愛必<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>費；多藏必厚亡。</p>
<p><a id="pn-5" class="pn">[5]</a> 知足不辱，知止不殆，可以長久。</p>
</article>
