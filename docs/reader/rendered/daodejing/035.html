<h2>第三十五章</h2>
<p><a id="pn-1" class="pn">[1]</a> 執<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>象，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>往。</p>
<p><a id="pn-2" class="pn">[2]</a> 往而不害，安平<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 樂與餌，過客止。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>之出口，淡乎其<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>味，視之不足見，聽之不足聞，用之不足既。</p>
