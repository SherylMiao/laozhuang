<h2>第五章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>不<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>，以<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>為芻狗；<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>不<span class="entity entity-concept" data-entity-type="concept" data-canonical="仁">仁</span>，以<span class="entity entity-identity" data-entity-type="identity" data-canonical="百姓">百姓</span>為芻狗。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>之間，其猶橐籥乎？</p>
<p><a id="pn-3" class="pn">[3]</a> 虛而不屈，動而愈出。</p>
<p><a id="pn-4" class="pn">[4]</a> 多言數窮，不如守中。</p>
