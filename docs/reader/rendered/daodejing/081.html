<h2>第八十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>言不美，美言不<span class="entity entity-concept" data-entity-type="concept" data-canonical="信">信</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="善">善</span>者不辯，辯者<span class="entity entity-concept" data-entity-type="concept" data-canonical="不善">不善</span>。</p>
<p><a id="pn-3" class="pn">[3]</a> 知者不博，博者不知。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>不積，既以為人己愈<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>，既以與人己愈多。</p>
<p><a id="pn-5" class="pn">[5]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天">天</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，利而不害；<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>，為而<span class="entity entity-concept" data-entity-type="concept" data-canonical="不爭">不爭</span>。</p>
