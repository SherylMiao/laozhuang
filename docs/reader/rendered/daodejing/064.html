<h2>第六十四章</h2>
<p><a id="pn-1" class="pn">[1]</a> 其安易持，其未兆易謀。</p>
<p><a id="pn-2" class="pn">[2]</a> 其脆易泮，其微易散。</p>
<p><a id="pn-3" class="pn">[3]</a> 為之於未<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>，治之於未亂。</p>
<p><a id="pn-4" class="pn">[4]</a> 合抱之木，生於毫末；九層之臺，起於累土；千里之行，始於足下。</p>
<p><a id="pn-5" class="pn">[5]</a> 為者敗之，執者失之。</p>
<p><a id="pn-6" class="pn">[6]</a> 是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span><span class="entity entity-concept" data-entity-type="concept" data-canonical="無為">無為</span>故<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>敗；<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>執故<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>失。</p>
<p><a id="pn-7" class="pn">[7]</a> 民之從事，常於幾成而敗之。</p>
<p><a id="pn-8" class="pn">[8]</a> 慎終如始，則<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>敗事，是以<span class="entity entity-identity" data-entity-type="identity" data-canonical="聖人">聖人</span>欲不欲，不貴難得之貨；學不學，復衆人之所過，以輔<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="自然">自然</span>，而不敢為。</p>
</article>
