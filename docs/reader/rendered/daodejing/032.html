<h2>第三十二章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>常<span class="entity entity-concept" data-entity-type="concept" data-canonical="無">無</span>名。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>莫能臣也。</p>
<p><a id="pn-3" class="pn">[3]</a> <span class="entity entity-identity" data-entity-type="identity" data-canonical="侯王">侯王</span>若能守之，<span class="entity entity-concept" data-entity-type="concept" data-canonical="萬物">萬物</span>將自賓。</p>
<p><a id="pn-4" class="pn">[4]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="天地">天地</span>相合，以降甘露，民莫之令而自均。</p>
<p><a id="pn-5" class="pn">[5]</a> 始制<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>名，名亦既<span class="entity entity-concept" data-entity-type="concept" data-canonical="有">有</span>，夫亦將知止，知止所以不殆。</p>
<p><a id="pn-6" class="pn">[6]</a> 譬<span class="entity entity-concept" data-entity-type="concept" data-canonical="道">道</span>之在<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>，猶川<span class="entity entity-concept" data-entity-type="concept" data-canonical="谷">谷</span>之與江海。</p>
