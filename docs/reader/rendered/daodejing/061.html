<h2>第六十一章</h2>
<p><a id="pn-1" class="pn">[1]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國者下流，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>之交，<span class="entity entity-identity" data-entity-type="identity" data-canonical="天下">天下</span>之<span class="entity entity-concept" data-entity-type="concept" data-canonical="牝">牝</span>。</p>
<p><a id="pn-2" class="pn">[2]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="牝">牝</span>常以靜勝牡，以靜為下。</p>
<p><a id="pn-3" class="pn">[3]</a> 故<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國以下<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>國，則取<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>國；<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>國以下<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國，則取<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國。</p>
<p><a id="pn-4" class="pn">[4]</a> 故或下以取，或下而取。</p>
<p><a id="pn-5" class="pn">[5]</a> <span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>國不過欲兼畜人，<span class="entity entity-concept" data-entity-type="concept" data-canonical="小">小</span>國不過欲入事人。</p>
<p><a id="pn-6" class="pn">[6]</a> 夫兩者各得其所欲，<span class="entity entity-concept" data-entity-type="concept" data-canonical="大">大</span>者宜為下。</p>
</article>
